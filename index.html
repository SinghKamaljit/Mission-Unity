<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mission Unity</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#20264A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20264A;
    --ink-soft:#3B4272;
    --paper:#EDE7D9;
    --paper-raised:#F6F2E8;
    --brass:#B08D57;
    --brass-bright:#C9A24B;
    --line:#D8CFB8;
    --text:#20264A;
    --text-muted:#6B6F8F;
    --ok:#4C7A5B;
    --danger:#A3432F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .screen{max-width:520px;margin:0 auto;padding:20px 18px 40px;}

  /* Header */
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:18px 4px 22px;user-select:none;
  }
  .brand-mark{font-size:22px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .brand-name{font-size:19px;margin:0;color:var(--ink);}
  .brand-tag{font-size:11px;color:var(--text-muted);letter-spacing:.04em;display:block;margin-top:2px;}

  /* Entry */
  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px;
  }
  .field-label{font-size:12px;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;display:block;}
  input[type=text],input[type=number]{
    width:100%;
    font-family:'Fraunces',serif;
    font-size:22px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
  }
  input:focus{outline:2px solid var(--brass);outline-offset:1px;}
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    padding:13px 18px;
  }
  .btn-primary{background:var(--ink);color:#fff;width:100%;margin-top:14px;}
  .btn-primary:disabled{opacity:.4;cursor:default;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .hint{font-size:12.5px;color:var(--text-muted);margin-top:16px;line-height:1.5;}

  /* Room header */
  .room-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .room-title{font-size:20px;margin:0;}
  .room-sub{font-size:12px;color:var(--text-muted);}
  .status-pill{
    font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;
  }
  .status-active{background:#DCE7DE;color:var(--ok);}
  .status-resolved{background:#EFE0D2;color:var(--brass);}

  /* Seats grid */
  .seat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
    margin-bottom:18px;
  }
  .seat{
    border:1px solid var(--line);
    background:var(--paper-raised);
    border-radius:9px;
    padding:12px 6px;
    text-align:center;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .seat-code{font-family:'Fraunces',serif;font-size:17px;display:block;}
  .seat-state{font-size:10px;color:var(--text-muted);display:block;margin-top:3px;letter-spacing:.03em;text-transform:uppercase;}
  .seat.mine{border-color:var(--ink);background:var(--ink);}
  .seat.mine .seat-code,.seat.mine .seat-state{color:#fff;}
  .seat.taken:not(.mine){opacity:.5;cursor:default;}
  .seat.silent{border-style:dashed;}

  /* Thread */
  .thread-wrap{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .thread{
    max-height:52vh;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{max-width:88%;}
  .msg-meta{font-size:11px;color:var(--text-muted);margin-bottom:2px;}
  .msg-body{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 12px;
    font-size:14.5px;
    line-height:1.45;
    white-space:pre-wrap;
  }
  .msg.self .msg-body{background:#E4E9F5;border-color:#C7D0EA;}
  .msg.resolution .msg-body{background:#FBF1DF;border-color:var(--brass);}
  .msg.resolution .msg-meta{color:var(--brass);font-weight:600;}
  .empty-thread{color:var(--text-muted);font-size:13.5px;text-align:center;padding:30px 10px;}

  .composer{
    display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);
  }
  .composer textarea{
    flex:1;resize:none;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-family:'Inter',sans-serif;font-size:14.5px;
    min-height:38px;max-height:100px;
  }
  .composer button{padding:0 16px;background:var(--ink);color:#fff;}
  .watch-only{padding:12px;text-align:center;font-size:12.5px;color:var(--text-muted);border-top:1px solid var(--line);}

  .toolbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .toolbar button{flex:1;}

  /* Admin overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(32,38,74,.72);
    display:flex;align-items:flex-end;justify-content:center;z-index:50;
  }
  .sheet{
    background:var(--paper-raised);
    width:100%;max-width:520px;
    border-radius:16px 16px 0 0;
    padding:20px;
  }
  .sheet h3{margin:0 0 14px;font-size:17px;}
  .confirm-box{
    border:1px solid var(--danger);
    background:#FBE9E4;
    border-radius:8px;
    padding:12px;
    font-size:13.5px;
    margin-top:12px;
    line-height:1.5;
  }
  .row{display:flex;gap:8px;margin-top:10px;}
  .row button{flex:1;}
  .link-line{
    display:flex;gap:8px;align-items:center;
    background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;margin-top:6px;font-size:13px;color:var(--text-muted);
  }
</style>
</head>
<body>

<div class="screen">

  <div class="brand">
    <div>
      <h1 class="brand-name">Mission Unity</h1>
      <span class="brand-tag">From duality to oneness</span>
    </div>
    <div class="brand-mark" id="brandMark">🙏</div>
  </div>

  <!-- ENTRY VIEW -->
  <div id="entryView" class="card">
    <span class="field-label">Room number</span>
    <input type="number" id="roomInput" placeholder="e.g. 1" inputmode="numeric">
    <button class="btn-primary" id="enterRoomBtn">Enter room</button>
    <p class="hint">Sit at the seat you were told to. Rooms not part of anything until someone sits.</p>
  </div>

  <!-- ROOM VIEW -->
  <div id="roomView" style="display:none;">
    <div class="room-head">
      <div>
        <h2 class="room-title" id="roomTitleText">Room —</h2>
        <span class="room-sub" id="roomSub">loading…</span>
      </div>
      <span class="status-pill status-active" id="statusPill">Active</span>
    </div>

    <div class="seat-grid" id="seatGrid"></div>

    <div class="thread-wrap">
      <div class="thread" id="thread"><div class="empty-thread">No matter yet.</div></div>
      <div class="composer" id="composer" style="display:none;">
        <textarea id="msgInput" placeholder="Speak here…"></textarea>
        <button id="sendBtn">Send</button>
      </div>
      <div class="watch-only" id="watchOnly" style="display:none;">You are seated as a silent witness.</div>
    </div>

    <div class="toolbar" id="evaluatorTools" style="display:none;">
      <button class="btn-ghost" id="resolveBtn">Post resolution</button>
      <button class="btn-ghost" id="exportBtn" style="display:none;">Export PDF</button>
    </div>

    <button class="btn-ghost" style="width:100%;margin-top:14px;" id="leaveRoomBtn">Leave room</button>
  </div>
</div>

<!-- ADMIN SHEET -->

<div class="overlay" id="adminOverlay" style="display:none;">
  <div class="sheet">
    <h3>Admin</h3>
    <span class="field-label">Room to manage</span>
    <input type="number" id="adminRoomInput" placeholder="Room number" inputmode="numeric">
    <div class="link-line" id="adminRoomStatus">—</div>
    <div class="row">
      <button class="btn-danger" id="adminClearBtn">Clear room</button>
      <button class="btn-ghost" id="adminCloseBtn">Close</button>
    </div>
    <div class="confirm-box" id="adminConfirmBox" style="display:none;"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
/* ---------- Seat model: one generic seat, two permission tiers ---------- */
const SEATS = [
  {id:'evaluator', code:'EVAL', canPost:true},
  {id:'p1', code:'P1', canPost:true},
  {id:'p2', code:'P2', canPost:true},
  {id:'a1', code:'A1', canPost:true},
  {id:'a2', code:'A2', canPost:true},
  {id:'s1', code:'S1', canPost:false},
  {id:'s2', code:'S2', canPost:false},
  {id:'s3', code:'S3', canPost:false},
  {id:'s4', code:'S4', canPost:false},
  {id:'s5', code:'S5', canPost:false},
];

// Room 13: "Tera" — the general discussion room. Ten open speaking seats,
// no evaluator, no resolution, no export. Each seat asks for a name/nickname
// once, on claiming — shown alongside the seat code in the thread only,
// never shrunk to fit the small seat tile.
const TERA_SEATS = Array.from({length:10}, (_,i)=>({id:'t'+(i+1), code:'T'+(i+1), canPost:true}));

function seatSetFor(roomId){ return roomId === 'room13' ? TERA_SEATS : SEATS; }
function isTeraRoom(roomId){ return roomId === 'room13'; }

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let uid = null;
let currentRoomId = null;
let currentSeatId = null;
let currentRoomData = null;
let unsubRoom = null;
let unsubMsgs = null;

auth.onAuthStateChanged(user=>{
  if(user){ uid = user.uid; }
});
auth.signInAnonymously().catch(e=>console.error('auth error', e));

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.error('sw error', e));
  });
}

/* ---------- Entry ---------- */
const entryView = document.getElementById('entryView');
const roomView = document.getElementById('roomView');
const roomInput = document.getElementById('roomInput');

document.getElementById('enterRoomBtn').addEventListener('click', ()=>{
  const n = roomInput.value.trim();
  if(!n) return;
  goToRoom(n);
});

// support ?room=3 in the link
const params = new URLSearchParams(window.location.search);
if(params.get('room')){
  roomInput.value = params.get('room');
  waitForAuthThen(()=>goToRoom(params.get('room')));
}

function waitForAuthThen(fn){
  const check = setInterval(()=>{
    if(uid){ clearInterval(check); fn(); }
  }, 150);
}

function roomDocId(n){ return 'room' + String(n).trim(); }

async function goToRoom(n){
  currentRoomId = roomDocId(n);
  history.replaceState(null,'', '?room=' + encodeURIComponent(n));
  entryView.style.display = 'none';
  roomView.style.display = 'block';
  document.getElementById('roomTitleText').textContent = 'Room ' + n;

  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      seats: Object.fromEntries(seatSetFor(currentRoomId).map(s=>[s.id,null])),
      names: Object.fromEntries(seatSetFor(currentRoomId).map(s=>[s.id,null])),
      status:'active',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastActivity: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  currentSeatId = localStorage.getItem('seat_' + currentRoomId) || null;

  if(unsubRoom) unsubRoom();
  unsubRoom = ref.onSnapshot(doc=>{
    if(!doc.exists) return;
    currentRoomData = doc.data();
    renderRoom(currentRoomData);
  });

  if(unsubMsgs) unsubMsgs();
  unsubMsgs = ref.collection('messages').orderBy('ts','asc').onSnapshot(qs=>{
    renderThread(qs.docs.map(d=>({id:d.id,...d.data()})));
  });
}

/* ---------- Seats ---------- */
function renderRoom(data){
  const seats = seatSetFor(currentRoomId);
  const pill = document.getElementById('statusPill');
  pill.textContent = data.status === 'resolved' ? 'Resolved' : 'Active';
  pill.className = 'status-pill ' + (data.status === 'resolved' ? 'status-resolved' : 'status-active');
  document.getElementById('roomSub').textContent =
    currentSeatId ? ('Seated as ' + seats.find(s=>s.id===currentSeatId).code) : 'Choose your seat';

  const grid = document.getElementById('seatGrid');
  grid.innerHTML = '';
  seats.forEach(seat=>{
    const owner = data.seats ? data.seats[seat.id] : null;
    const mine = currentSeatId === seat.id;
    const taken = !!owner;
    const div = document.createElement('div');
    div.className = 'seat' + (mine ? ' mine' : '') + (taken && !mine ? ' taken' : '') + (!seat.canPost ? ' silent' : '');
    div.innerHTML = `<span class="seat-code">${seat.code}</span><span class="seat-state">${mine ? 'You' : (taken ? 'Taken' : 'Empty')}</span>`;
    div.addEventListener('click', ()=>handleSeatTap(seat, owner, mine));
    grid.appendChild(div);
  });

  // composer / watch-only visibility
  const seatObj = currentSeatId ? seats.find(s=>s.id===currentSeatId) : null;
  document.getElementById('composer').style.display = (seatObj && seatObj.canPost) ? 'flex' : 'none';
  document.getElementById('watchOnly').style.display = (seatObj && !seatObj.canPost) ? 'block' : 'none';
  document.getElementById('evaluatorTools').style.display = (currentSeatId === 'evaluator') ? 'flex' : 'none';
  document.getElementById('exportBtn').style.display = (currentSeatId === 'evaluator' && data.status === 'resolved') ? 'inline-block' : 'none';
}

async function releaseCurrentSeat(){
  if(!currentSeatId || !currentRoomId) return;
  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  await ref.update({
    ['seats.'+currentSeatId]: null,
    ['names.'+currentSeatId]: null,
    lastActivity: firebase.firestore.FieldValue.serverTimestamp()
  });
  localStorage.removeItem('seat_' + currentRoomId);
  currentSeatId = null;
}

async function handleSeatTap(seat, owner, mine){
  if(mine){
    if(!confirm('Leave this seat and free it? You can then tap the correct one.')) return;
    await releaseCurrentSeat();
    return;
  }
  if(owner) return; // taken by someone else

  let name = null;
  if(isTeraRoom(currentRoomId)){
    name = prompt('What should we call you here? (name or nickname — any length is fine)');
    if(name === null) return; // cancelled, don't claim the seat
    name = name.trim();
  }

  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  await ref.update({
    ['seats.'+seat.id]: uid,
    ['names.'+seat.id]: name || null,
    lastActivity: firebase.firestore.FieldValue.serverTimestamp()
  });
  currentSeatId = seat.id;
  localStorage.setItem('seat_' + currentRoomId, seat.id);
}

/* ---------- Thread ---------- */
function renderThread(msgs){
  const seats = seatSetFor(currentRoomId);
  const thread = document.getElementById('thread');
  if(msgs.length === 0){
    thread.innerHTML = '<div class="empty-thread">No matter yet.</div>';
    return;
  }
  thread.innerHTML = '';
  msgs.forEach(m=>{
    const div = document.createElement('div');
    const self = m.seat === currentSeatId;
    div.className = 'msg' + (self ? ' self' : '') + (m.resolution ? ' resolution' : '');
    const code = seats.find(s=>s.id===m.seat)?.code || m.seat;
    const label = m.name ? (code + ' — ' + m.name) : code;
    div.innerHTML = '<div class="msg-meta"></div><div class="msg-body"></div>';
    div.querySelector('.msg-meta').textContent = (m.resolution ? 'Resolution — ' : '') + label;
    div.querySelector('.msg-body').textContent = m.text;
    thread.appendChild(div);
  });
  thread.scrollTop = thread.scrollHeight;
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentSeatId) return;
  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  const name = currentRoomData?.names?.[currentSeatId] || null;
  await ref.collection('messages').add({
    seat: currentSeatId, text, name, ts: firebase.firestore.FieldValue.serverTimestamp(), resolution:false
  });
  await ref.update({lastActivity: firebase.firestore.FieldValue.serverTimestamp()});
  input.value = '';
}

/* ---------- Evaluator: resolution + export ---------- */
document.getElementById('resolveBtn').addEventListener('click', async ()=>{
  const text = prompt('Write the resolution. This will be posted and the room marked resolved.');
  if(!text) return;
  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  await ref.collection('messages').add({
    seat:'evaluator', text, ts: firebase.firestore.FieldValue.serverTimestamp(), resolution:true
  });
  await ref.update({status:'resolved', lastActivity: firebase.firestore.FieldValue.serverTimestamp()});
});

document.getElementById('exportBtn').addEventListener('click', async ()=>{
  // Open the window synchronously, inside the click gesture, so mobile
  // popup blockers don't silently kill it once we start awaiting Firestore.
  const printWin = window.open('', '_blank');
  if(!printWin){
    alert('Your browser blocked the export window. Please allow pop-ups for this site and try again.');
    return;
  }
  printWin.document.write('<p style="font-family:sans-serif;padding:24px;color:#666;">Preparing record…</p>');

  const ref = db.collection('sakshi_rooms').doc(currentRoomId);
  const msgs = await ref.collection('messages').orderBy('ts','asc').get();
  const title = document.getElementById('roomTitleText').textContent + ' — Record';

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const seats = seatSetFor(currentRoomId);
  let rows = '';
  msgs.forEach(d=>{
    const m = d.data();
    const code = seats.find(s=>s.id===m.seat)?.code || m.seat;
    const label = m.name ? (code + ' — ' + m.name) : code;
    const prefix = m.resolution ? 'RESOLUTION — ' : '';
    rows += `<p class="${m.resolution ? 'resolution' : ''}"><strong>${esc(prefix + label)}:</strong> ${esc(m.text)}</p>`;
  });
  if(!rows){ rows = '<p>No matter recorded.</p>'; }

  printWin.document.open();
  printWin.document.write(`<!DOCTYPE html><html><head><title>${esc(title)}</title>
    <meta charset="UTF-8">
    <style>
      body{font-family:Georgia,serif;padding:28px;color:#20264A;max-width:640px;margin:0 auto;}
      h2{font-family:Georgia,serif;border-bottom:2px solid #B08D57;padding-bottom:10px;}
      p{line-height:1.6;font-size:14px;margin:10px 0;}
      p.resolution{background:#FBF1DF;border-left:3px solid #B08D57;padding:10px 12px;}
    </style>
    </head><body><h2>${esc(title)}</h2>${rows}</body></html>`);
  printWin.document.close();
  printWin.focus();
  // give the new document a moment to lay out before invoking print
  setTimeout(()=>{ printWin.print(); }, 350);
});

document.getElementById('leaveRoomBtn').addEventListener('click', async ()=>{
  await releaseCurrentSeat();
  if(unsubRoom) unsubRoom();
  if(unsubMsgs) unsubMsgs();
  roomView.style.display = 'none';
  entryView.style.display = 'block';
  history.replaceState(null,'', window.location.pathname);
});

/* ---------- Admin: folded-hands x3, clear a room, with confirm ---------- */
let tapTimes = [];
document.getElementById('brandMark').addEventListener('click', ()=>{
  const now = Date.now();
  tapTimes.push(now);
  tapTimes = tapTimes.filter(t=>now - t < 1200);
  if(tapTimes.length >= 3){
    tapTimes = [];
    openAdmin();
  }
});

const adminOverlay = document.getElementById('adminOverlay');
const adminRoomInput = document.getElementById('adminRoomInput');
const adminRoomStatus = document.getElementById('adminRoomStatus');
const adminConfirmBox = document.getElementById('adminConfirmBox');

function openAdmin(){
  adminConfirmBox.style.display = 'none';
  adminRoomInput.value = currentRoomId ? currentRoomId.replace('room','') : '';
  adminOverlay.style.display = 'flex';
  refreshAdminRoomStatus();
}
document.getElementById('adminCloseBtn').addEventListener('click', ()=>adminOverlay.style.display='none');
adminRoomInput.addEventListener('input', refreshAdminRoomStatus);

async function refreshAdminRoomStatus(){
  const n = adminRoomInput.value.trim();
  if(!n){ adminRoomStatus.textContent = '—'; return; }
  const snap = await db.collection('sakshi_rooms').doc(roomDocId(n)).get();
  if(!snap.exists){ adminRoomStatus.textContent = 'Room ' + n + ': not created yet.'; return; }
  const data = snap.data();
  const last = data.lastActivity ? data.lastActivity.toDate().toLocaleString() : 'unknown';
  adminRoomStatus.textContent = 'Room ' + n + ' — ' + data.status + ' — last activity ' + last;
}

document.getElementById('adminClearBtn').addEventListener('click', ()=>{
  const n = adminRoomInput.value.trim();
  if(!n) return;
  adminConfirmBox.style.display = 'block';
  adminConfirmBox.innerHTML = `Do you really want to clear the chat/matter of Room ${n}? This removes every seat and every message. This cannot be undone.
    <div class="row">
      <button class="btn-danger" id="confirmYes">Yes, clear it</button>
      <button class="btn-ghost" id="confirmNo">No, keep it</button>
    </div>`;
  document.getElementById('confirmNo').addEventListener('click', ()=>{ adminConfirmBox.style.display='none'; });
  document.getElementById('confirmYes').addEventListener('click', ()=>clearRoom(n));
});

async function clearRoom(n){
  const id = roomDocId(n);
  const ref = db.collection('sakshi_rooms').doc(id);
  const msgs = await ref.collection('messages').get();
  const batch = db.batch();
  msgs.forEach(d=>batch.delete(d.ref));
  const seats = seatSetFor(id);
  batch.set(ref, {
    seats: Object.fromEntries(seats.map(s=>[s.id,null])),
    names: Object.fromEntries(seats.map(s=>[s.id,null])),
    status:'active',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    lastActivity: firebase.firestore.FieldValue.serverTimestamp()
  });
  await batch.commit();
  if(currentRoomId === id){
    localStorage.removeItem('seat_' + id);
    currentSeatId = null;
  }
  adminConfirmBox.style.display = 'none';
  refreshAdminRoomStatus();
  alert('Room ' + n + ' is cleared and free for a new matter.');
}
</script>
</body>
</html>
